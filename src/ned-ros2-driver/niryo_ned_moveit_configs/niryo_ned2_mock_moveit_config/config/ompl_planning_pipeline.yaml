planning_plugin: "ompl_interface/OMPLPlanner"
request_adapters:
  - "default_planner_request_adapters/AddTimeParameterizationAdapter"
start_state_max_bounds_error: 0.1
jiggle_fraction: 0.05
max_goal_count: 10
longest_valid_segment_fraction: 0.005

ompl:
  planning_plugin: "ompl_interface/OMPLPlanner"
  request_adapters:
    - "default_planner_request_adapters/AddTimeParameterizationAdapter"
  start_state_max_bounds_error: 0.1
  jiggle_fraction: 0.05
  max_goal_count: 10
  longest_valid_segment_fraction: 0.005
  low_level_motion_planning_lib: "ompl_interface::OMPLPlanner"
  
  planner_configs:
    - SBL
    - EST
    - CForest
    - KPIECE
    - BKPIECE
    - LBKPIECE
    - PDST
    - STRIDE
    - RRT
    - RRTConnect
    - RRTstar
    - TRRT
    - PRM
    - PRMstar
    - LazyPRM
    - LazyPRMstar
    - SPARS
    - SPARSstar
    
  SBL:
    type: geometric::SBL
    range: 0.0
    
  EST:
    type: geometric::EST
    range: 0.0
    goal_bias: 0.05
    
  CForest:
    type: geometric::CForest
    range: 0.0
    goal_bias: 0.05
    num_vert: 250
    num_edges_per_vertex: 20
    max_failures: 1000
    
  KPIECE:
    type: geometric::KPIECE1
    range: 0.0
    goal_bias: 0.05
    border_fraction: 0.9
    failed_expansion_score_factor: 0.5
    min_valid_path_fraction: 0.5
    
  BKPIECE:
    type: geometric::BKPIECE1
    range: 0.0
    goal_bias: 0.05
    border_fraction: 0.9
    failed_expansion_score_factor: 0.5
    min_valid_path_fraction: 0.5
    max_curvature: 1.0
    
  LBKPIECE:
    type: geometric::LBKPIECE1
    range: 0.0
    goal_bias: 0.05
    border_fraction: 0.9
    failed_expansion_score_factor: 0.5
    min_valid_path_fraction: 0.5
    
  PDST:
    type: geometric::PDST
    range: 0.0
    goal_bias: 0.05
    
  STRIDE:
    type: geometric::STRIDE
    range: 0.0
    goal_bias: 0.05
    estimated_dimension: 0.0
    use_projected_distance: false
    max_projection_evaluation: 200
    
  RRT:
    type: geometric::RRT
    range: 0.0
    goal_bias: 0.05
    
  RRTConnect:
    type: geometric::RRTConnect
    range: 0.0
    goal_bias: 0.05
    
  RRTConnectkConfigDefault:
    type: geometric::RRTConnect
    range: 0.0
    goal_bias: 0.05
    
  RRTstar:
    type: geometric::RRTstar
    range: 0.0
    goal_bias: 0.05
    delay_collision_checking: 1
    
  TRRT:
    type: geometric::TRRT
    range: 0.0
    goal_bias: 0.05
    max_planning_duration: 10.0
    inflation: 1.1
    kcontext: 6.0
    klocalfrac: 0.0
    
  PRM:
    type: geometric::PRM
    max_nearest_neighbors: 10
    
  PRMstar:
    type: geometric::PRMstar
    
  LazyPRM:
    type: geometric::LazyPRM
    range: 0.0
    
  LazyPRMstar:
    type: geometric::LazyPRMstar
    range: 0.0
    
  SPARS:
    type: geometric::SPARS
    max_nearest_neighbors: 10
    dense_delta_fraction: 0.001
    sparse_delta_fraction: 0.25
    stretch_factor: 1.3
    
  SPARSstar:
    type: geometric::SPARSstar
    dense_delta_fraction: 0.001
    sparse_delta_fraction: 0.25
    stretch_factor: 1.3
