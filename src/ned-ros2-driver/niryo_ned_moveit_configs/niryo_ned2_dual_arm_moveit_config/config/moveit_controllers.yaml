# MoveIt uses this configuration for controller management
# Controllers route trajectories through the async executor for collision checking
# and asynchronous execution.
#
# Communication flow:
#   MoveIt (prefixed names)
#     ↓
#   /arm_X/follow_joint_trajectory (async executor server)
#     ↓ (collision check + scheduling)
#   /arm_X_controller/follow_joint_trajectory (actual controller)
#     ↓
#   Joint trajectory execution

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - arm_1
    - arm_2

  # Arm 1 controller routes through async executor
  # Async executor server at: /arm_1/follow_joint_trajectory
  # Accepts: [arm_1_joint_1, arm_1_joint_2, ...]
  # Async executor forwards to: /arm_1_controller/follow_joint_trajectory
  arm_1:
    type: FollowJointTrajectory
    joints:
      - arm_1_joint_1
      - arm_1_joint_2
      - arm_1_joint_3
      - arm_1_joint_4
      - arm_1_joint_5
      - arm_1_joint_6
    action_ns: follow_joint_trajectory
    default: true

  # Arm 2 controller routes through async executor
  # Async executor server at: /arm_2/follow_joint_trajectory
  # Accepts: [arm_2_joint_1, arm_2_joint_2, ...]
  # Async executor forwards to: /arm_2_controller/follow_joint_trajectory
  arm_2:
    type: FollowJointTrajectory
    joints:
      - arm_2_joint_1
      - arm_2_joint_2
      - arm_2_joint_3
      - arm_2_joint_4
      - arm_2_joint_5
      - arm_2_joint_6
    action_ns: follow_joint_trajectory
    default: true