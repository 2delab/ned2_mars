/**:
  ros__parameters:
    planning_scene_monitor_options:
      name: "planning_scene_monitor"
      robot_description: "robot_description"
      joint_state_topic: "/joint_states"
      attached_collision_object_topic: "/moveit_py/planning_scene_monitor"
      publish_planning_scene_topic: "/moveit_py/publish_planning_scene"
      monitored_planning_scene_topic: "/moveit_py/monitored_planning_scene"
      wait_for_initial_state_timeout: 10.0

    planning_pipelines:
      pipeline_names: ["ompl"]
      default_planning_pipeline: "ompl"

    plan_request_params:
      planning_attempts: 1
      planning_pipeline: ompl
      max_velocity_scaling_factor: 1.0
      max_acceleration_scaling_factor: 1.0

    # Load OMPL planning pipeline configuration
    # This ensures time parameterization is applied automatically
    ompl_planning_pipeline:
      planning_plugin: "ompl_interface/OMPLPlanner"
      request_adapters:
        - "default_planner_request_adapters/AddTimeParameterizationAdapter"
      start_state_max_bounds_error: 0.1
      jiggle_fraction: 0.05
      max_goal_count: 10
      longest_valid_segment_fraction: 0.005
      
    ompl:
      plan_request_params:
        planning_attempts: 1
        planning_pipeline: ompl
        planner_id: "RRTConnectkConfigDefault"
        max_velocity_scaling_factor: 1.0
        max_acceleration_scaling_factor: 1.0
        planning_time: 1.0

    moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager
    
    moveit_simple_controller_manager:
      controller_names:
        - arm_controller
      arm_controller:
        type: FollowJointTrajectory
        joints:
          - joint_1
          - joint_2
          - joint_3
          - joint_4
          - joint_5
          - joint_6
        action_ns: follow_joint_trajectory
        default: true
